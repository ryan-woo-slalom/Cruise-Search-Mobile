<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">Pacific Coast</title>
  <desc id="desc">Sunset coast scene with ocean waves.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd5a8" />
      <stop offset="100%" stop-color="#fff0db" />
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3e95c3" />
      <stop offset="100%" stop-color="#2c668e" />
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#sky)" />
  <path d="M0 255 C130 280, 280 220, 430 250 C560 273, 690 232, 800 255 L800 420 L0 420 Z" fill="url(#water)" />
  <path d="M0 312 C160 286, 300 340, 500 315 C650 297, 730 336, 800 320" stroke="#8ed6f3" stroke-width="9" fill="none" opacity="0.7" />
  <circle cx="680" cy="88" r="34" fill="#ffba69" />
